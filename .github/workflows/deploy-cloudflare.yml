name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
      CF_D1_DATABASE_NAME: ${{ vars.CF_D1_DATABASE_NAME }}
      CF_D1_DATABASE_ID: ${{ vars.CF_D1_DATABASE_ID }}
      CF_LOG_QUEUE_NAME: ${{ vars.CF_LOG_QUEUE_NAME }}
      CF_WORKERS_DEV: ${{ vars.CF_WORKERS_DEV }}
      CF_PREVIEW_URLS: ${{ vars.CF_PREVIEW_URLS }}
      CF_COMPATIBILITY_DATE: ${{ vars.CF_COMPATIBILITY_DATE }}
      CF_COMPATIBILITY_FLAGS: ${{ vars.CF_COMPATIBILITY_FLAGS }}
      CF_CUSTOM_DOMAIN_PATTERN: ${{ vars.CF_CUSTOM_DOMAIN_PATTERN }}
      CF_CUSTOM_DOMAIN_ZONE_NAME: ${{ vars.CF_CUSTOM_DOMAIN_ZONE_NAME }}
      CF_CUSTOM_DOMAIN_ENABLED: ${{ vars.CF_CUSTOM_DOMAIN_ENABLED }}
      CF_LOG_QUEUE_MAX_BATCH_SIZE: ${{ vars.CF_LOG_QUEUE_MAX_BATCH_SIZE }}
      CF_LOG_QUEUE_MAX_BATCH_TIMEOUT: ${{ vars.CF_LOG_QUEUE_MAX_BATCH_TIMEOUT }}
      CF_LOG_QUEUE_MAX_RETRIES: ${{ vars.CF_LOG_QUEUE_MAX_RETRIES }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.11.1

      - name: Show toolchain versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-online

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Configure Wrangler
        run: npm run cf:configure

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build OpenNext Worker
        run: npm run cf:build

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "$CF_D1_DATABASE_NAME" --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: npm
          secrets: |
            JWT_ACCESS_SECRET
            JWT_REFRESH_SECRET
        env:
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
